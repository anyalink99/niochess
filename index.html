<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>niochess</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/anyalink99/niokit@0.3.0/css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/anyalink99/niokit@0.3.0/css/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <button class="burger" id="burger" aria-label="menu">☰</button>
  <div class="scrim" id="scrim"></div>

  <header>
    <h1>nio<em>chess</em></h1>
  </header>

  <div class="stage">
    <div class="board-wrap">
      <div class="board-frame">
        <div class="grid" id="grid"></div>
        <div class="pieces" id="layer"></div>
        <div class="banner" id="banner">
          <h3 id="bTitle"></h3>
          <p id="bSub"></p>
          <button class="k-btn k-btn--primary k-btn--lg" id="bBtn" data-i18n="newGame">New game</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel">
      <div id="settings">
        <div class="seg">
          <button class="seg-opt is-on" id="tabNet" data-i18n="tabNet">Network</button>
          <button class="seg-opt" id="tabLocal" data-i18n="tabLocal">Single</button>
        </div>

        <div id="netBox">
          <div class="fld">
            <span><span data-i18n="roomCode">Room code</span> <span style="color:var(--accent)" data-i18n="roomShared">shared with a friend</span></span>
            <div class="codeRow">
              <input type="text" class="k-field" id="code" data-i18n-ph="codePlaceholder" autocomplete="off" spellcheck="false">
              <button class="k-btn k-btn--icon" id="genCode" title="random code">⟳</button>
            </div>
          </div>
          <button class="k-btn k-btn--primary k-btn--block" id="connectBtn" data-i18n="connect">Connect</button>
          <p class="netStatus" id="netStatus"></p>
        </div>

        <div class="k-card fld">
          <div class="lblRow"><span data-i18n="travel">Flight time</span><span id="ttLabel">10.0 s</span></div>
          <input type="range" class="k-range" id="travel" min="1000" max="20000" step="500" value="10000">
        </div>

        <div class="k-card fld">
          <div class="lblRow"><span data-i18n="flight">Max pieces in flight</span><span id="flLabel">16</span></div>
          <input type="range" class="k-range" id="flight" min="1" max="16" step="1" value="16">
        </div>

        <div class="k-card row aiSwitchRow" id="aiSwitch">
          <span data-i18n="aiOn">AI plays Black</span>
          <label class="k-switch"><input type="checkbox" id="ai" checked><span class="k-switch__track"></span></label>
        </div>

        <div class="k-card aiCard" id="aiPanel">
          <div class="aiHead" data-i18n="aiHead">AI settings</div>
          <div class="fld">
            <div class="lblRow"><span data-i18n="aiAggr">Aggression (captures)</span><span id="lCap">0.70</span></div>
            <input type="range" class="k-range" id="aCap" min="0" max="1" step="0.05" value="0.7">
          </div>
          <div class="fld">
            <div class="lblRow"><span data-i18n="aiSnipe">Sniping (intercept)</span><span id="lSnipe">0.60</span></div>
            <input type="range" class="k-range" id="aSnipe" min="0" max="1" step="0.05" value="0.6">
          </div>
          <div class="fld">
            <div class="lblRow"><span data-i18n="aiReact">King reaction</span><span id="lReact">1.0–3.0 s</span></div>
            <div class="dual">
              <input type="range" class="k-range" id="aReactMin" min="0" max="5" step="0.1" value="1">
              <input type="range" class="k-range" id="aReactMax" min="0" max="5" step="0.1" value="3">
            </div>
          </div>
          <div class="fld">
            <div class="lblRow"><span data-i18n="aiTempo">Move tempo</span><span id="lMove">0.6–1.5 s</span></div>
            <div class="dual">
              <input type="range" class="k-range" id="aMoveMin" min="0.2" max="4" step="0.1" value="0.6">
              <input type="range" class="k-range" id="aMoveMax" min="0.2" max="4" step="0.1" value="1.5">
            </div>
          </div>
        </div>
      </div>

      <div class="k-card">
        <div class="row"><span><i class="dot w"></i><span data-i18n="statWhite">White</span></span><b id="cntW">0</b></div>
        <div class="row"><span><i class="dot b"></i><span data-i18n="statBlack">Black</span></span><b id="cntB">0</b></div>
        <div class="row"><span data-i18n="statFlight">In flight</span><b id="cntMove">0</b></div>
      </div>

      <button class="k-btn k-btn--ghost k-btn--block" id="resetBtn" data-i18n="newGame">New game</button>
      <button class="k-btn k-btn--ghost k-btn--block hidden" id="surrenderBtn" data-i18n="surrender">Surrender</button>

      <div class="k-accordion" id="rulesAcc" data-single>
        <section class="k-accordion__item">
          <button class="k-accordion__header" type="button" data-i18n="rulesTitle">Rules</button>
          <div class="k-accordion__body"><div class="k-accordion__inner rulesText" id="rulesText"></div></div>
        </section>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/anyalink99/niokit@0.3.0/js/kit.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/anyalink99/niokit@0.3.0/js/accordion.js"></script>
  <script type="module" src="js/ui.js"></script>
</body>
</html>
